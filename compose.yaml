services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: engineering_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18 uses a major-version-specific PGDATA below this mount.
      - engineering-memory-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d engineering_memory"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  engineering-memory-postgres:
